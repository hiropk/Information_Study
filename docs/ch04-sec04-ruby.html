## 1　プログラミングの基礎

プログラミング言語では，基本的な計算や，基本制御構造をどのように表現しているだろうか。

### 1　変数を使用したプログラム

ここでは，プログラミング言語の **Ruby** を使用する。

変数とは，メモリ上のデータ（値）を格納する領域のことをいい，その領域に付けた名前を**変数名**という。変数は一般的に値を格納する箱に例えられることが多い。

Rubyでは，代入文によって変数の宣言が実行される。また，変数には，どのような型のデータも代入できるため，型を宣言する必要はない[^1]。変数に値を格納することを**代入**[^2]という。

#### Rubyの基本的な命令文

| 命令文 | 説明 |
|---|---|
| \`puts 値\` | （）内の値を表示し，改行する。変数名を指定した場合は，変数の値を表示する。 |
| \`print 値\` | 値を表示する。改行しない。 |
| \`gets.chomp\` | ユーザにキーボードから値を入力させ，末尾の改行を除いた文字列を返す。 |
| \`gets.to_i\` | ユーザの入力を整数型に変換して返す。 |
| \`gets.to_f\` | ユーザの入力を実数型に変換して返す。 |

#### Rubyの基本的な演算子

| 演算子 | 意味 | 演算子 | 意味 |
|---|---|---|---|
| \`+\` | 加算 | \`%\` | 余り |
| \`-\` | 減算 | \`/\` | 除算（整数どうしの場合は商の整数部分） |
| \`*\` | 乗算 | \`**\` | べき乗 |

> **文字列の扱い**
> Rubyでは，文字列を \`'\`（シングルクォーテーション）か \`"\`（ダブルクォーテーション）で囲って表す。
> ダブルクォーテーションの中では \`#{変数名}\` と書くことで，変数の値を文字列に埋め込むことができる（**文字列補間**）。

---

### 例題 1　二つの値を加算するプログラム

ユーザが入力した二つの整数を加算し，結果を表示するプログラムを作成してみよう。

#### 考え方

ユーザが入力した数値は，文字として扱われるので，\`.to_i\` を使用して整数型に変換する。

#### アルゴリズム

1. \`a\` にユーザが入力した数値を代入
2. \`b\` にユーザが入力した数値を代入
3. \`c\` に \`a + b\` の結果を代入
4. 文字列 \`'a + bは'\` を表示
5. \`c\` を表示

#### プログラム

\`\`\`ruby
① print "数字aを入力: "
② a = gets.to_i
③ print "数字bを入力: "
④ b = gets.to_i
⑤ c = a + b
⑥ puts "a + bは"
⑦ puts c
\`\`\`

#### 考察

\`puts\` に \`""\`（ダブルクォーテーション）で囲んだ文字列を書くとそのまま表示される。一方，変数名を書くとその値が表示される。
また，\`"a + bは #{c}"\` のように文字列補間を使えば，1行にまとめて表示することもできる。

減算，乗算，除算の結果も表示されるように，例題1のプログラムを変更してみよう。

### 2　分岐構造を使用したプログラム

これまでに学習したように，アルゴリズムには順次，分岐，反復の三つの基本制御構造がある。これをプログラムで表現するために，プログラミング言語には，プログラムの流れを制御する**制御文**と呼ばれる命令文が用意されている。ここでは，分岐構造を使用するプログラムを扱う。

#### if文の記述方法

\`\`\`ruby
if 条件1
  処理1
elsif 条件2
  処理2
else
  処理3
end
\`\`\`

もし条件1が成り立つならば処理1を実行する。そうでなくもし条件2が成り立つならば処理2を実行する。そうでなければ処理3を実行する。

※ \`elsif\` と \`else\` は，それぞれ省略可能である。

#### Rubyの比較演算子

| 演算子 | 意味 | 演算子 | 意味 |
|---|---|---|---|
| \`==\` | 等しい | \`<\` | 未満 |
| \`!=\` | 等しくない | \`>=\` | 以上 |
| \`>\` | 超過 | \`<=\` | 以下 |

### 例題 2　偶数か奇数か判定するプログラム

ユーザが入力した整数が，偶数か奇数，もしくはゼロか判定するプログラムを作成してみよう。

#### 考え方

分岐構造の制御文である \`if\` 文を使用する。偶数かどうかは，2で割った余りがゼロかどうかで判定する。

#### アルゴリズム

1. ユーザが入力した数値を整数型に変換し，変数 \`a\` に代入
2. もし \`a\` が 0 と等しければ
3. 　\`'ゼロ'\` と表示
4. そうでなくもし \`a\` を2で割った余りが 0 ならば
5. 　\`'偶数'\` と表示
6. そうでなければ
7. 　\`'奇数'\` と表示

#### プログラム

\`\`\`ruby
① print "数字を入力: "
② a = gets.to_i
③ if a == 0
④   puts "ゼロ"
⑤ elsif a % 2 == 0
⑥   puts "偶数"
⑦ else
⑧   puts "奇数"
⑨ end
\`\`\`

> Rubyでは，\`if\` に続く処理のまとまりは，インデント（字下げ）で表し，\`end\` で終わりを示す。

#### 考察

分岐構造を活用するためには，比較演算子を適切に使用する必要がある。

### 3　反復構造を使用したプログラム

ここでは，反復構造の制御文を使用したプログラムを扱う。反復構造の制御文には，繰り返しの回数があらかじめ定まっている場合に適している \`for\` 文と，回数が定まっていない場合に適している \`while\` 文の二つがあり，アルゴリズムに応じて使い分ける必要がある。

#### for文の記述方法

\`\`\`ruby
for 制御変数 in 初期値..終了値
  処理
end
\`\`\`

制御変数[^3]の値が初期値から終了値になるまで[^4]の間，処理の実行を繰り返す。制御変数の値は，繰り返しのたびに1ずつ自動的に増える。

> \`初期値..終了値\` は終了値を**含む**範囲を表す（**範囲オブジェクト**）。
> 終了値を含まない場合は \`初期値...終了値\`（ドット3つ）と書く。

#### while文の記述方法

\`\`\`ruby
while 条件
  処理
end
\`\`\`

条件が成り立つ間，処理を繰り返し実行する。

### 例題 3-1　任意の九九の段を表示するプログラム

入力した数字に対し，1から9までの数をかけた結果を順に表示するプログラムを作成してみよう。

#### 考え方

9回繰り返せばよいとわかっているため，\`for\` 文を使用する。

#### アルゴリズム

1. ユーザが入力した数値を整数型に変換し，変数 \`a\` に代入
2. \`i\` を 1 から 9 まで 1 ずつ増やしながら繰り返し
3. 　\`a × i\` を表示

#### プログラム

\`\`\`ruby
① print "数字を入力: "
② a = gets.to_i
③ for i in 1..9
④   puts a * i
⑤ end
\`\`\`

### 例題 3-2　パスワードを確認するプログラム

正しいパスワード（\`Joho1\` とする）をユーザが入力するまで，入力させ続けるプログラムを作成してみよう。

#### 考え方

ユーザが何回目で正しいパスワードを入力するかはわからないため，\`while\` 文を使用する。

#### アルゴリズム

1. 正しいパスワードを \`a\` に代入
2. ユーザが入力したパスワードを \`b\` に代入
3. \`a\` と \`b\` が等しくない間，④を繰り返し
4. 　パスワードをユーザに再入力させる
5. 正しいパスワードが入力されたことを表示

#### プログラム

\`\`\`ruby
① a = "Joho1"
② print "パスワードを入力: "
③ b = gets.chomp
④ while a != b
⑤   print "パスワードを再入力: "
⑥   b = gets.chomp
⑦ end
⑧ puts "正しく入力されました"
\`\`\`

> **\`gets\` と \`gets.chomp\` の違い**
> \`gets\` は入力した文字列の末尾に改行文字（\`\\n\`）が含まれる。\`chomp\` を付けると改行が取り除かれるため，文字列の比較には \`gets.chomp\` を使用する。

#### 考察

\`while\` 文の場合は，条件を柔軟に設定できる。一方，\`for\` 文よりも終了条件の管理に注意が必要である。

### 4　配列

**配列**とは，複数のデータをまとめて扱えるようにし，全体に対して一つの名前を付けたものである[^5]。マンションの部屋が順番に並んでいる状態に例えられる。一つひとつのデータを格納できる領域を**要素**という。配列の要素は，配列名と**添字**（インデックス）と呼ばれる番号で指定する。

#### Rubyにおける配列の宣言の方法

\`\`\`ruby
# 要素の数を決めずに宣言する方法
a = []

# 要素に値を代入して宣言する方法
a = [3, 4, 5]
\`\`\`

この場合，三つの要素をもった配列が生成される。添字0の要素 \`a[0]\` に値 \`3\` が格納されている[^6]。

#### Rubyにおける要素の追加方法

\`\`\`ruby
a.push(値)   # 配列の最後に要素を追加する
a << 値      # push と同じ意味（Rubyらしい書き方）
\`\`\`

#### 配列の要素の表示方法

\`\`\`ruby
puts a        # 要素を1行ずつ表示する
p a           # 配列の構造ごと表示する（デバッグ時に便利）
puts a.inspect  # "[3, 4, 5]" のような形式で表示する
\`\`\`

### 例題 4　ユーザが指定した九九の段を配列に格納するプログラム

ユーザが指定した九九の段を配列に格納し，その後格納した値を表示するプログラムを作成してみよう。

#### 考え方

要素の数を指定せずに配列を宣言し，要素を追加しながら九九のある段を配列に格納する。わかりやすくするため，添字0に「指定された値×0」，添字1に「指定された値×1」の値が格納されるようにする。

#### アルゴリズム

1. 配列 \`a\` を要素の数を決めずに宣言
2. ユーザが入力した数値を整数型に変換し，変数 \`b\` に代入
3. \`i\` を 0 から 9 まで 1 ずつ増やしながら④の処理を繰り返し
4. 　\`b × i\` を \`a\` の要素として追加
5. 配列 \`a\` の要素をすべて表示

#### プログラム

\`\`\`ruby
① a = []
② print "数字を入力: "
③ b = gets.to_i
④ for i in 0..9
⑤   a.push(b * i)
⑥ end
⑦ puts a.inspect
\`\`\`

#### 考察

配列に格納されたすべての要素は \`puts a\` で1行ずつ，\`puts a.inspect\` で一覧として表示できる。

---

### 確認問題 4

例題4のプログラムを実行すると，添字0に格納されている値（0）も表示されてしまう。配列の中から添字1から9までの値だけを表示するプログラムを作成してみよう。

## 2　関数を使用したプログラム

大規模なプログラムを効率よく作成するためには，どのようにプログラムを記述したらよいだろうか。

### 1　関数（メソッド）とは

プログラムの規模が大きくなると，同じ処理を複数の箇所で行う必要が生じることが多い。そのためプログラミング言語には，その部分を抜き出して別に記述することができる機能が用意されている。抜き出して記述した部分を**関数**[^7]と呼ぶ。関数は**引数**を受け取って一連の処理を実行し，**戻り値**[^8]を返す。

### 例題 5　自動販売機を関数と見立てたときの引数と戻り値

関数とは，受け取った引数をもとに処理を行って結果を返すものなので，清涼飲料水の自動販売機のような機械も関数とみなすことができる。この場合，引数と戻り値はそれぞれ何にあたるか整理してみよう。

#### 解答例

| | 内容 |
|---|---|
| **引数** | 投入金額・押したボタン |
| **戻り値** | 清涼飲料水 |

#### 考察

解答例以外にも，釣銭が出てくる場合や，売り切れで清涼飲料水が出ない場合など，戻り値にはいろいろなケースが考えられる。このように見ていくと，単純に見える自動販売機も実際は複雑な関数であることがわかる。

---

### 2　関数の定義

Rubyで使用できる関数（**メソッド**）は，Rubyにあらかじめ用意されている組み込みメソッドと，プログラムの作成者が任意に定義する**ユーザ定義メソッド**に分かれる。

#### メソッドの定義方法

\`\`\`ruby
def メソッド名(引数名)
  処理
  return 戻り値
end
\`\`\`

[^7]: Rubyでは，関数のことを**メソッド**と呼ぶ。フローチャートでは，定義済み処理の記号で記述する。
[^8]: 数学で扱う関数は引数・戻り値ともに数値であることが一般的だが，Rubyでは数値以外の文字なども引数や戻り値にすることができる。

---

### 例題 6　四捨五入の処理をするユーザ定義関数

正の小数を小数第1位で四捨五入する，メソッド \`myround\` を作成してみよう。

#### 考え方

四捨五入は，四捨五入をする値に0.5を加えて小数点以下を切り捨てて求める。引数と戻り値を表のように整理しておく[^9]。なお，メソッドを呼び出す側のプログラムはプログラム1のようになる。

| | 名前 | 意味 |
|---|---|---|
| **引数** | \`arg\` | 四捨五入する値 |
| **戻り値** | | 四捨五入した結果 |

#### プログラム1（呼び出し側）

\`\`\`ruby
① a = 7.4
② puts myround(a)
③ b = 7.5
④ puts myround(b)
\`\`\`

※ プログラム1は，メソッド定義の後に書く必要がある。

#### アルゴリズム

1. \`arg\` を引数としたメソッドを定義
2. 引数 \`arg\` に 0.5 を加えた値を \`a\` に代入
3. \`a\` の小数以下を切り捨てた値を \`b\` に代入
4. \`b\` の値を戻り値とする

#### プログラム（メソッド定義）

\`\`\`ruby
① def myround(arg)
②   a = arg + 0.5
③   b = a.to_i
④   return b
⑤ end
\`\`\`

> **\`.to_i\` による切り捨て**
> \`.to_i\` は小数点以下を切り捨てて整数型に変換する。

#### 考察

Rubyでは，\`def\` 文に続く行から始まるコードブロックがメソッドの本体となる。コードブロックは \`end\` で終わりを示す。

> **参考　変数のスコープ**
> **スコープ**とは，宣言した変数が有効となる範囲を示す言葉である。メソッドの内側で宣言した変数（**ローカル変数**）は，メソッドの外側からはアクセスできない。スコープが複数のメソッドをまたいで有効な変数を**グローバル変数**という（Rubyでは \`$変数名\` で表す）。

[^9]: 引数が複数あるメソッドを定義することもできる。Rubyでは複数の戻り値を配列などで返すことができる。

---

### 3　APIとWeb API

**API**とは，プログラムの機能やデータなどを外部のプログラムから利用できるようにしたものである。利用する側は，自分が作成したメソッドを呼び出すときと同じように，外部のAPIを呼び出して利用することができる。

特に，インターネット経由でHTTPプロトコルを用いて利用できるAPIのことを**Web API**という。例えば，SNSの投稿をプログラムから行うことができるAPIやメッセージアプリの返信を自動で行うためのAPI，政府の統計データをプログラムから取得することができるAPIなど，多様なAPIが公開されている。

---

## 3　探索と整列のプログラム

データの探索や並べ替えを行うためには，どのようなアルゴリズムを用いればよいだろうか。また，アルゴリズムによって効率に差はあるだろうか。

### 1　線形探索のアルゴリズム

**探索**[^10]とは，たくさんのデータの中から目的のデータを探し出すことをいう。最も単純なアルゴリズムは，最初のデータから順番に一つずつ調べていく，というものである。これを**線形探索**という。

---

### 例題 7　線形探索で在庫数を調べるプログラム

下のような商品番号・商品名・在庫数のデータを格納した二次元配列[^11]がある。商品番号を，線形探索のアルゴリズムを用いて配列から探索し，商品名と在庫数を表示するプログラムを作成してみよう。

\`\`\`ruby
stock = [
  [1001, "飲料水A",  87],
  [1003, "飲料水B",  89],
  [1004, "飲料水C",  52],
  [1007, "飲料水D", 120],
  [1011, "飲料水E", 119],
  [2001, "菓子パンA", 67]
]
\`\`\`

#### 考え方

最初の在庫データから順番に目的のデータかどうか調べていけばよい。発見した場合は，\`break\` 文[^12]を利用して繰り返しから抜けるようにする。

#### 変数一覧

| 変数名 | 格納する値 |
|---|---|
| \`i\` | 探索する在庫データの添字 |
| \`n\` | データ数 |
| \`srch_stck\` | 探索対象の商品番号 |

#### プログラム

\`\`\`ruby
① print "商品番号: "
② srch_stck = gets.to_i  # 探索する商品番号を入力[^13]
③ n = stock.length        # データ数[^14]
④ for i in 0..n-1         # データ数の数だけ繰り返し
⑤   if srch_stck == stock[i][0]   # 商品が見つかった場合の処理
⑥     puts "#{stock[i][0]} #{stock[i][1]} #{stock[i][2]}"  # 結果を表示
⑦     break               # 探索終了
⑧   end
⑨ end
\`\`\`

#### 考察

線形探索は，最初のデータから順番に調べていくため，効率が悪い。データの量に比例して必要な繰り返しの回数も増えていく。一方で，アルゴリズムは単純であるため，プログラムのコードは簡単なものになる。

[^10]: 探索は，人間も日常的に行っている。例えば，指示された教科書のページを開く，という動作も探索の一つである。
[^11]: 二次元配列とは，二つの添字で要素を指定する配列のことである。この場合，\`stock[1][0]\` の要素には商品番号:1003，\`stock[1][1]\` には商品名:飲料水B，\`stock[1][2]\` には在庫数:89がそれぞれ格納されている。
[^12]: \`for\` 文や \`while\` 文による繰り返しの中で \`break\` 文が実行されると，その場で繰り返しから抜け，次の処理に移る。
[^13]: \`#\` に続いている部分をコメントという。コメントとは，プログラムの作成者が記述する注釈である。コメントはコンピュータには実行されない。
[^14]: \`stock.length\` は配列の要素数を返すメソッドである。

---

### 2　二分探索のアルゴリズム

**二分探索**とは，データを半分に分けてどちらに探索するデータが含まれているか調べ，含まれているほうのデータをさらに半分に分ける，という手順を繰り返すアルゴリズムである。あらかじめ**整列されているデータ**に対して用いることができる。

---

### 例題 8　二分探索で在庫数を調べるプログラム

例題7の商品番号[^15] \`2001\` を二分探索で探索するプログラムを作成してみよう。

#### 考え方（Ⅰ〜Ⅲの流れ）

**Ⅰ**
- 中央のデータを求める。データは添字0の要素（要素1）と添字5の要素（要素6）の間にあるので，\`(0+5)/2\` より，添字2の要素（要素3）[^16]。
- 添字2の要素（要素3）の商品番号は1004。探索するデータは後ろ半分にある。
- 探索する範囲を添字3から添字5とする。

**Ⅱ**
- 中央のデータを求める。\`(3+5)/2\` より，添字4の要素（要素5）。
- 添字4の要素の商品番号は1011。探索するデータは後ろ半分にある。
- 探索する範囲を，添字5から添字5とする。

**Ⅲ**
- 中央のデータを求める。\`(5+5)/2\` より，添字5の要素。
- 添字5の要素の商品番号は2001。探索するデータを発見した。

#### プログラム

\`\`\`ruby
① print "商品番号: "
② srch_stck = gets.to_i  # 探索する商品番号を入力
③ imin = 0               # 探索範囲の添字の最小値
④ imax = 5               # 探索範囲の添字の最大値
⑤ while imin <= imax     # 探索範囲に要素が存在する間は繰り返し
⑥   imid = (imin + imax) / 2          # 中央のデータの添字
⑦   if stock[imid][0] == srch_stck    # 探索対象を発見
⑧     puts "#{stock[imid][0]} #{stock[imid][1]} #{stock[imid][2]}"
⑨     break                           # 探索終了
⑩   elsif stock[imid][0] > srch_stck  # 探索対象が前半にある場合
⑪     imax = imid - 1                 # 次の探索範囲を中央より前半に
⑫   else                              # 探索対象が後半にある場合
⑬     imin = imid + 1                 # 次の探索範囲を中央より後半に
⑭   end
⑮ end
\`\`\`

> **整数の割り算**
> Rubyでは，整数どうしを \`/\` で割ると商の整数部分が返る（例：\`(3+5)/2\` → \`4\`）。

#### 考察

少ない繰り返しの回数で探索対象を見つけることができると期待できるが，線形探索よりアルゴリズムが複雑なため，コードも複雑になっている。

[^15]: 商品番号は小さい順に並んでいるとする。
[^16]: 今回のプログラムでは，データが偶数個の場合，中央のデータのうち，小さいほうを中央のデータとする。

---

### 3　アルゴリズムの評価

線形探索と二分探索のように同じ結果を得られるアルゴリズムが複数ある場合，どのようなアルゴリズムが優れているといえるだろうか。一般的には，**計算量**[^17]が少ないアルゴリズムが優れているといえる[^18]。

線形探索は探索するデータが2倍になると計算量が2倍になるが，二分探索の計算量は繰り返し1回分しか増えないことが予想される。そのため，二分探索のほうが優れたアルゴリズムといえる。

[^17]: アルゴリズムの実行時間の目安になる量を計算量という。プログラムが終了するまでに実行される命令数に比例すると考えればよい。
[^18]: プログラムの実行時間は，コンピュータの性能やそのときの状態によっても変化するため，アルゴリズムの評価には，計算量のほうが適している。

---

### 4　整列のアルゴリズム

データをある値に基づいて並べ替えることを**整列**という。ここでは，**バブルソート**と呼ばれる整列のアルゴリズム[^19]について学ぶ。

---

### 例題 9　バブルソートを実行するプログラム

下のようにバラバラの順で配列に格納された在庫データを，バブルソートのアルゴリズムを用いて，商品番号順に整列させるプログラムを作成してみよう。また，計算量を求めてみよう。

\`\`\`ruby
stock = [
  [2006, "菓子パンA", 67],
  [2009, "菓子パンD", 82],
  [2010, "菓子パンE", 82],
  [1003, "飲料水C",   52]
]
\`\`\`

#### 考え方　バブルソートのアルゴリズム

最も大きい商品番号のデータの場所から順に定めていくという考え方で整列を行う。

**Ⅰ** 最も商品番号が大きいデータを，最後の要素（添字3）に移動する。
- 添字0の要素と添字1の要素の商品番号を比較 → 添字0が小さい → そのまま
- 添字1の要素と添字2の要素の商品番号を比較 → 添字1が小さい → そのまま
- 添字2の要素と添字3の要素を比較 → 添字2のほうが大きい → 添字2と添字3を入れ替え

**Ⅱ** 2番目に大きいデータを，最後から二つ目の要素（添字2）に移動する。
- 添字0と添字1を比較 → 添字0が小さい → そのまま
- 添字1と添字2を比較 → 添字1が大きい → 入れ替え

**Ⅲ** 3番目に大きいデータを，最後から三つ目の要素（添字1）に移動する。
- 添字0と添字1を比較 → 添字0が大きい → 入れ替え
- 一番小さいデータも同時に最初の行に移動されているため整列完了

#### 考え方　変数に格納したデータの入れ替え

Rubyでは，**多重代入**の機能を使うことで，一時変数を用意しなくても二つの変数の値を入れ替えることができる[^20]。

\`\`\`ruby
# 多重代入による入れ替え（Rubyの便利な書き方）
a, b = b, a
\`\`\`

これを利用すると，配列の行ごとの入れ替えは次のように書ける。

\`\`\`ruby
stock[i], stock[i+1] = stock[i+1], stock[i]
\`\`\`

#### 変数一覧

| 変数名 | 格納する値 |
|---|---|
| \`i\` | 比較対象の添字 |
| \`imax\` | \`i\` の最大値 |
| \`comp\` | 計算量 |
| \`start_ind\` | 在庫データの最初の添字 |
| \`last_ind\` | 在庫データの最後の添字 |

#### プログラム

\`\`\`ruby
①  comp      = 0  # 計算量
②  start_ind = 0  # 最初の要素の添字
③  last_ind  = 3  # 最後の要素の添字
④  imax = last_ind - 1
⑤  while imax >= start_ind   # 比較対象の添字の最大値[^21]
⑥    for i in start_ind..imax  # 最初の要素からimaxまで比較する[^22]
⑦      comp += 1               # 計算量を加算[^23]
⑧      if stock[i][0] > stock[i+1][0]  # 添字が小さい要素の商品番号が大きい
⑨        stock[i], stock[i+1] = stock[i+1], stock[i]  # 行ごと入れ替え
⑩      end
⑪    end
⑫    imax -= 1
⑬  end
⑭  for i in start_ind..last_ind  # 実行結果を表示
⑮    puts stock[i].inspect
⑯  end
⑰  puts comp  # 計算量を表示
\`\`\`

#### 実行結果

\`\`\`
[1003, "飲料水C", 52]
[2006, "菓子パンA", 67]
[2009, "菓子パンD", 82]
[2010, "菓子パンE", 82]
6
\`\`\`

#### 考察

Rubyの多重代入を用いると，入れ替え処理の部分をわずか1行で記述することができる。

\`\`\`ruby
stock[i], stock[i+1] = stock[i+1], stock[i]
\`\`\`

これは，商品番号・商品名・在庫数の3つのデータを含む行ごと一括で入れ替えるため，Python版やマクロ版よりもコードが大幅に簡潔になっている。
