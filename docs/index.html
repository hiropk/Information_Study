<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>授業の選択｜情報</title>
    <meta
      name="description"
      content="クラス・科目・年度を選択して授業ページへ"
    />
    <link rel="stylesheet" href="./assets/style.css" />
  </head>
  <body>
    <a class="skip-link" href="#main">本文へスキップ</a>

    <header class="site-header">
      <div class="container header-inner">
        <div class="brand">
          <div class="brand-title">高等学校教科 情報</div>
          <div class="brand-subtitle">クラス・科目・年度を選択</div>
        </div>
        <button
          class="nav-toggle"
          type="button"
          aria-label="メニュー"
          aria-expanded="false"
          data-nav-toggle
        >
          <svg class="nav-toggle-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <path d="M4 7h16M4 12h16M4 17h16" />
          </svg>
        </button>
        <nav class="nav" aria-label="ナビゲーション" data-nav>
          <a href="./links.html">リンク集</a>
        </nav>
      </div>
    </header>

    <main id="main" class="container">
      <section class="hero hero-centered">
        <div class="hero-card">
          <h1 class="hero-title">授業ページを選ぶ</h1>
          <p class="hero-lead">
            複数クラス／情報I・情報IIに対応するため、最初に「年度・科目・クラス」を選択してください。
          </p>

          <form class="selector" id="course-selector">
            <div class="selector-row">
              <label class="selector-field">
                <span class="selector-label">年度</span>
                <select class="select" name="year" id="sel-year" required>
                  <option value="2026">2026</option>
                  <option value="2027">2027</option>
                  <option value="2028">2028</option>
                  <option value="2029">2029</option>
                  <option value="2030">2030</option>
                </select>
              </label>

              <label class="selector-field">
                <span class="selector-label">科目</span>
                <select class="select" name="subject" id="sel-subject" required>
                  <option value="I">情報I</option>
                  <option value="II">情報II</option>
                </select>
              </label>

              <label class="selector-field">
                <span class="selector-label">クラス</span>
                <select class="select" name="class" id="sel-class" required>
                  <option value="2-1">2-1</option>
                </select>
              </label>
            </div>

            <div class="hero-actions">
              <button class="btn primary" type="submit">授業ページへ</button>
            </div>
          </form>
        </div>
      </section>
    </main>

    <div data-include="./partials/footer.html"></div>

    <script src="./assets/include.js"></script>
    <script src="./assets/site.js"></script>
  </body>
</html>
