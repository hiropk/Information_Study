<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="color-scheme" content="light dark" />
    <title>授業｜情報</title>
    <meta
      name="description"
      content="高等学校 必修科目「情報」 生徒向けページ"
    />
    <link rel="icon" href="./assets/favicon.png" type="image/png" />
    <link rel="stylesheet" href="./assets/style.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0&icon_names=expand_more"
    />
  </head>
  <body>
    <a class="skip-link" href="#main">本文へスキップ</a>

    <div data-include="./partials/header-course.html"></div>

    <main id="main" class="container">
      <section id="attendance" class="panel">
        <div class="panel-head">
          <h2>出席入力</h2>
          <button
            class="section-toggle"
            type="button"
            aria-expanded="false"
            aria-controls="attendance-body"
            aria-label="出席入力を開く"
          >
            <span class="material-symbols-outlined" aria-hidden="true"
              >expand_more</span
            >
          </button>
        </div>
        <div class="hidden" id="attendance-body">
          <form class="attendance-form" id="attendance-form" action="javascript:void(0)" novalidate>
            <div class="attendance-fields">
              <div class="attendance-field attendance-field--narrow">
                <label class="selector-label" for="att-student-code">出席番号</label>
                <select class="select" id="att-student-code" name="student_code" required>
                  <option value="">--</option>
                  <option value="01">1</option>
                  <option value="02">2</option>
                  <option value="03">3</option>
                  <option value="04">4</option>
                  <option value="05">5</option>
                  <option value="06">6</option>
                  <option value="07">7</option>
                  <option value="08">8</option>
                  <option value="09">9</option>
                  <option value="10">10</option>
                  <option value="11">11</option>
                  <option value="12">12</option>
                  <option value="13">13</option>
                  <option value="14">14</option>
                  <option value="15">15</option>
                  <option value="16">16</option>
                  <option value="17">17</option>
                  <option value="18">18</option>
                  <option value="19">19</option>
                  <option value="20">20</option>
                  <option value="21">21</option>
                  <option value="22">22</option>
                  <option value="23">23</option>
                  <option value="24">24</option>
                  <option value="25">25</option>
                  <option value="26">26</option>
                  <option value="27">27</option>
                  <option value="28">28</option>
                  <option value="29">29</option>
                  <option value="30">30</option>
                  <option value="31">31</option>
                  <option value="32">32</option>
                  <option value="33">33</option>
                  <option value="34">34</option>
                  <option value="35">35</option>
                  <option value="36">36</option>
                  <option value="37">37</option>
                  <option value="38">38</option>
                  <option value="39">39</option>
                  <option value="40">40</option>
                </select>
              </div>
              <div class="attendance-field">
                <label class="selector-label" for="att-status">状態</label>
                <select class="select" id="att-status" name="status" required>
                  <option value="present">出席</option>
                  <option value="absent">欠席</option>
                  <option value="late">遅刻</option>
                  <option value="early">早退</option>
                  <option value="excused">公欠</option>
                  <option value="bereaved">忌引き</option>
                  <option value="other">その他</option>
                </select>
              </div>
              <div class="attendance-field attendance-field--comment">
                <label class="selector-label" for="att-comment">備考（任意）</label>
                <textarea
                  class="input attendance-textarea"
                  id="att-comment"
                  name="comment"
                  placeholder="例: 体調不良のため見学"
                  autocomplete="off"
                  rows="2"
                ></textarea>
              </div>
            </div>
            <div class="attendance-actions">
              <button class="btn primary" type="submit" id="att-submit">送信</button>
            </div>
            <p class="attendance-msg hidden" id="att-msg" role="alert"></p>
          </form>
        </div>
      </section>

      <section id="announcements" class="panel">
        <div class="panel-head">
          <h2>お知らせ</h2>
          <button
            class="section-toggle"
            type="button"
            aria-expanded="true"
            aria-controls="announcements-list"
            aria-label="お知らせを折りたたむ"
          >
            <span class="material-symbols-outlined" aria-hidden="true"
              >expand_more</span
            >
          </button>
        </div>
        <ul class="list" id="announcements-list">
          <li class="list-item">
            <div class="badge">NEW</div>
            <div>
              <div class="item-title">このページを運用開始</div>
              <div class="item-meta">
                まずは「授業」「課題」を更新していきます。
              </div>
            </div>
          </li>
        </ul>
      </section>

      <section id="schedule" class="panel">
        <div class="panel-head">
          <h2>授業</h2>
          <div class="panel-actions">
            <input
              id="filter"
              class="input"
              type="search"
              placeholder="検索（例: データ, ネットワーク, Python）"
              autocomplete="off"
            />
            <button
              class="section-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="schedule-cards"
              aria-label="授業を折りたたむ"
            >
              <span class="material-symbols-outlined" aria-hidden="true"
                >expand_more</span
              >
            </button>
          </div>
        </div>

        <div class="cards" id="schedule-cards">
          <article class="card" data-tags="導入 情報モラル ルール">
            <div class="card-top">
              <div class="pill">第1回</div>
              <div class="card-title">ガイダンス／学び方とルール</div>
            </div>
            <div class="card-body">
              <ul class="mini">
                <li>この授業で扱う範囲</li>
                <li>提出・評価の考え方</li>
                <li>情報モラルの基本</li>
              </ul>
            </div>
            <div class="card-foot">
              <a class="link" href="#assignments">課題を見る →</a>
            </div>
          </article>
        </div>
      </section>

      <section id="assignments" class="panel">
        <div class="panel-head">
          <h2>課題</h2>
          <div class="panel-actions">
            <input
              id="filter-assignments"
              class="input"
              type="search"
              placeholder="検索（例: 締切, 提出）"
              autocomplete="off"
            />
            <button
              class="section-toggle"
              type="button"
              aria-expanded="true"
              aria-controls="assignment-cards"
              aria-label="課題を折りたたむ"
            >
              <span class="material-symbols-outlined" aria-hidden="true"
                >expand_more</span
              >
            </button>
          </div>
        </div>

        <div class="cards" id="assignment-cards">
          <article
            class="card"
            data-status="open"
            data-due="未定"
            data-tags="自己紹介 タイピング ファイル操作 環境確認"
          >
            <div class="card-top">
              <div class="pill warn">提出</div>
              <div class="card-title">課題0：自己紹介（学習環境チェック）</div>
            </div>
            <div class="card-body">
              <div class="kv">
                <div class="k">締切</div>
                <div class="v">未定（授業で案内）</div>
              </div>
              <div class="kv">
                <div class="k">内容</div>
                <div class="v">タイピング・ファイル操作・簡単なルール確認</div>
              </div>
            </div>
            <div class="card-foot">
              <span class="muted">詳細は授業で配布</span>
            </div>
          </article>
        </div>
      </section>

      <section id="resources" class="panel">
        <div class="panel-head">
          <h2>資料</h2>
          <button
            class="section-toggle"
            type="button"
            aria-expanded="true"
            aria-controls="resources-body"
            aria-label="資料を折りたたむ"
          >
            <span class="material-symbols-outlined" aria-hidden="true"
              >expand_more</span
            >
          </button>
        </div>
        <div id="resources-body">
          <div class="resources">
            <a
              class="resource"
              href="./syllabus.html"
            >
              <div class="resource-title">シラバス</div>
              <div class="resource-meta">令和7年度 情報I 授業計画・評価基準</div>
            </a>
            <a
              class="resource"
              href="assets/slides/0415.pdf"
              target="_blank"
              rel="noopener"
            >
              <div class="resource-title">4/15授業ガイダンス</div>
              <div class="resource-meta">初回の授業で話した自己紹介とか</div>
            </a>
          </div>
        </div>
      </section>
    </main>

    <div data-include="./partials/footer.html"></div>

    <script src="./assets/include.js"></script>
    <script src="./assets/site.js?v=20260410231102"></script>
  </body>
</html>
